<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday My Love ❤️</title>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    text-align: center;
  }

  h1 {
    color: white;
    margin-bottom: 10px;
  }

  .card {
    width: 300px;
    background: white;
    border-radius: 20px;
    padding: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    animation: fadeIn 0.6s ease;
  }

  .card img {
    width: 100%;
    border-radius: 15px;
  }

  p {
    margin-top: 10px;
    font-size: 16px;
  }

  button {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: #ff4d6d;
    color: white;
    cursor: pointer;
  }

  @keyframes fadeIn {
    from {opacity: 0; transform: scale(0.9);}
    to {opacity: 1; transform: scale(1);}
  }

  /* 💖 Hearts */
  .heart {
    position: fixed;
    bottom: -10px;
    font-size: 20px;
    animation: floatUp 6s linear infinite;
    color: red;
  }

  @keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-100vh); opacity: 0; }
  }

</style>
</head>

<body>

<h1>Happy Birthday My Love ❤️</h1>

<div class="card" id="card">
  <img id="img" src="bhavya(1).jpg.jpg">
  <p id="text">The day I met you changed everything ❤️</p>
</div>

<button onclick="nextCard()">Next ➡️</button>

<script>
const data = [
  {
    img: "bhavya(1).jpg.jpg",
    text: "Every moment with you is my favorite 💕"
  },
  {
    img: "bhavya(2).jpg",
    text: "You are my happiness ✨"
  },
  {
    img: "cutie.jpg",
    text: "Happy Birthday My Love ❤️🎂"
  }
];

let index = 0;

function nextCard() {
  index++;

  if (index < data.length) {
    document.getElementById("img").src = data[index].img;
    document.getElementById("text").innerText = data[index].text;
  } else {
    alert("I love you forever ❤️");
    index = data.length - 1;
  }
}

/* 💖 Floating Hearts */
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 10) + "px";

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}

setInterval(createHeart, 300);
</script>
</body>
</html>
